<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA DISTRIBOL - Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/supabase-js@2"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar bg-dark text-white vh-100 p-3">
            <h5 class="text-center border-bottom pb-2">SGA DISTRIBOL</h5>
            <ul class="nav nav-pills flex-column mt-3">
                <li class="nav-item"><a href="dashboard.html" class="nav-link text-white"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li class="nav-item"><a href="entrada.html" class="nav-link text-white"><i class="bi bi-box-seam"></i> Recepción</a></li>
                <li class="nav-item"><a href="salida.html" class="nav-link text-white"><i class="bi bi-truck"></i> Despacho</a></li>
                <li class="nav-item"><a href="productos.html" class="nav-link text-white"><i class="bi bi-archive"></i> Productos</a></li>
                <li class="nav-item"><a href="reportes.html" class="nav-link text-white active"><i class="bi bi-file-text"></i> Reportes</a></li>
                <li class="nav-item"><a href="usuarios.html" class="nav-link text-white"><i class="bi bi-people"></i> Usuarios</a></li>
                <li class="nav-item"><hr class="bg-secondary"></li>
                <li class="nav-item"><a href="#" id="btnCerrarSesion" class="nav-link text-white"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <h2><i class="bi bi-file-text"></i> Reportes y Kardex</h2>

            <!-- Filtros -->
            <div class="card mb-4">
                <div class="card-header bg-secondary text-white">
                    <i class="bi bi-funnel"></i> Filtros de búsqueda
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <label>Producto (SKU)</label>
                            <select id="filtroProducto" class="form-select">
                                <option value="">Todos los productos</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>Tipo de movimiento</label>
                            <select id="filtroTipo" class="form-select">
                                <option value="">Todos</option>
                                <option value="entrada">Entradas</option>
                                <option value="salida">Salidas</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>&nbsp;</label>
                            <button class="btn btn-primary w-100" onclick="cargarKardex()">
                                <i class="bi bi-search"></i> Filtrar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Botones de exportación -->
            <div class="mb-3">
                <button class="btn btn-success" onclick="exportarExcel()">
                    <i class="bi bi-file-excel"></i> Exportar a Excel
                </button>
                <button class="btn btn-danger" onclick="exportarPDF()">
                    <i class="bi bi-file-pdf"></i> Exportar a PDF
                </button>
                <button class="btn btn-info" onclick="imprimir()">
                    <i class="bi bi-printer"></i> Imprimir
                </button>
            </div>

            <!-- Tabla Kardex -->
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <i class="bi bi-journal-bookmark-fill"></i> Kardex de Inventario
                </div>
                <div class="card-body">
                    <div class="table-responsive" id="contenidoParaImprimir">
                        <table class="table table-bordered" id="tablaKardex">
                            <thead class="table-dark">
                                <tr>
                                    <th>Fecha</th>
                                    <th>Producto</th>
                                    <th>SKU</th>
                                    <th>Tipo</th>
                                    <th>Cantidad</th>
                                    <th>Usuario</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoKardex"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Resumen de inventario -->
            <div class="card mt-4">
                <div class="card-header bg-info text-white">
                    <i class="bi bi-pie-chart"></i> Resumen de Inventario
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <canvas id="graficoStock" width="400" height="200"></canvas>
                        </div>
                        <div class="col-md-6">
                            <div id="resumenTexto"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/reportes.js"></script>
</body>
</html>
