<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA DISTRIBOL - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 mt-5">
            <div class="card shadow-lg">
                <div class="card-header bg-white border-0 text-center pt-4">
                    <img src="https://via.placeholder.com/80x80?text=DISTRIBOL" alt="Logo" class="mb-3" style="width:80px">
                    <h3 class="fw-bold">DISTRIBOL S.R.L.</h3>
                    <p class="text-muted">Sistema de Gestión de Almacén</p>
                </div>
                <div class="card-body p-4">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" id="email" class="form-control" placeholder="admin@distribol.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">INGRESAR AL SISTEMA</button>
                    </form>
                    <div class="text-center mt-3">
                        <small class="text-muted">v1.0.0 - 2026 | Sistema Web de Gestión de Almacén</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
            alert('❌ Credenciales incorrectas: ' + error.message);
        } else {
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'dashboard.html';
        }
    });
</script>
</body>
</html>
