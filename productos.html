<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA DISTRIBOL - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/supabase-js@2"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar bg-dark text-white vh-100 p-3">
            <h5 class="text-center border-bottom pb-2">SGA DISTRIBOL</h5>
            <ul class="nav nav-pills flex-column mt-3">
                <li class="nav-item"><a href="dashboard.html" class="nav-link text-white"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li class="nav-item"><a href="entrada.html" class="nav-link text-white"><i class="bi bi-box-seam"></i> Recepción</a></li>
                <li class="nav-item"><a href="salida.html" class="nav-link text-white"><i class="bi bi-truck"></i> Despacho</a></li>
                <li class="nav-item"><a href="productos.html" class="nav-link text-white active"><i class="bi bi-archive"></i> Productos</a></li>
                <li class="nav-item"><a href="reportes.html" class="nav-link text-white"><i class="bi bi-file-text"></i> Reportes</a></li>
                <li class="nav-item"><a href="usuarios.html" class="nav-link text-white"><i class="bi bi-people"></i> Usuarios</a></li>
                <li class="nav-item"><hr class="bg-secondary"></li>
                <li class="nav-item"><a href="#" id="btnCerrarSesion" class="nav-link text-white"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-archive"></i> Gestión de Productos</h2>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalProducto" onclick="nuevoProducto()">
                    <i class="bi bi-plus-circle"></i> Nuevo Producto
                </button>
            </div>

            <!-- Tabla de productos con acciones -->
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped" id="tablaProductos">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>SKU</th>
                                    <th>Producto</th>
                                    <th>Categoría</th>
                                    <th>Stock</th>
                                    <th>Stock Mínimo</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="listaProductos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal para crear/editar producto -->
<div class="modal fade" id="modalProducto" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitulo">Nuevo Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formProducto">
                    <input type="hidden" id="productoId">
                    <div class="mb-3">
                        <label>Código SKU *</label>
                        <input type="text" id="skuCode" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Descripción *</label>
                        <textarea id="descripcion" class="form-control" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Categoría</label>
                        <input type="text" id="categoria" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Stock Actual</label>
                        <input type="number" id="stockActual" class="form-control" value="0">
                    </div>
                    <div class="mb-3">
                        <label>Stock Mínimo de Seguridad</label>
                        <input type="number" id="stockSeguridad" class="form-control" value="10">
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/productos.js"></script>
</body>
</html>
